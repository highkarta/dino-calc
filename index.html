<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Very Basic Calculator</title>
  <link rel="stylesheet" href="style.css">
  <script src="index.js" defer></script>
</head>
<body>
  <div id="calculator">
    <div id="display">
      <p>36</p>
    </div>
    <div id="buttons">
      <div class="col">
        <button>AC</button>
        <button>1</button>
        <button>4</button>
        <button>7</button>
      </div>
      <div class="col">
        <button>=</button>
        <button>2</button>
        <button>5</button>
        <button>8</button>
      </div>
      <div class="col">
        <button>0</button>
        <button>3</button>
        <button>6</button>
        <button>9</button>
      </div>
      <div class="col">
        <button>+</button>
        <button>-</button>
        <button>*</button>
        <button>/</button>
      </div>
    </div>
  </div>
</body>
</html>
